<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Orçamento Peraltas</title>
</head>
<body>
    <header class="header">
        <span class="logo" aria-hidden="true">🏕️</span>
        <div>
            <h1>Orçamento Peraltas</h1>
            <p class="subtitle">Abrir orçamento a partir do lead</p>
        </div>
    </header>

    <div id="status" class="status status--idle" role="status">Verificando a aba…</div>

    <section class="actions">
        <p class="section-label">Gerar orçamento</p>
        <div class="actions-row">
            <button id="budget" class="btn" disabled>Hospedagem</button>
            <button id="budget-corp" class="btn" disabled>Corporativo</button>
        </div>
        <button id="list-budgets" class="btn btn--secondary" disabled>Orçamentos do cliente</button>
    </section>

    <footer class="footer">
        Abra um <strong>lead no Kommo</strong> e clique na ação desejada.
    </footer>

    <script src="script.js"></script>
</body>
</html>
